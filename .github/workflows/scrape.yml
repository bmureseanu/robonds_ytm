name: scrape

on:
  schedule:
    # Every 15 min on weekdays during a UTC window that covers BVB business
    # hours (Mon-Fri 10:00–18:00 Europe/Bucharest) under both EET (UTC+2,
    # winter) and EEST (UTC+3, summer). The union window is 07:00–16:59 UTC.
    # An in-job guard below converts to local time and skips runs that fall
    # outside the actual Bucharest window for the current DST state.
    - cron: "*/15 7-16 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write
  # Required to dispatch deploy-pages on data refresh (GITHUB_TOKEN-authored
  # commits don't trigger workflows on their own).
  actions: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  # Authoritative Bucharest-local-time gate. Cron fires on a UTC window
  # that's wider than the actual business window (it has to, to cover
  # both EET in winter and EEST in summer). This job converts to local
  # time and decides whether the scrape job should run. workflow_dispatch
  # and push events always pass the gate so manual runs and CI on source
  # changes still work.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          set -e
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "non-schedule event (${{ github.event_name }}); passing gate"
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          export TZ=Europe/Bucharest
          DOW=$(date +%u)   # 1=Mon ... 7=Sun
          HOUR=$(date +%H)
          MIN=$(date +%M)
          echo "Bucharest local: $(date), DOW=$DOW HOUR=$HOUR:$MIN"
          if [ "$DOW" -gt 5 ]; then
            echo "weekend; skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 10:00 inclusive, 18:00 exclusive.
          if [ "$((10#$HOUR))" -lt 10 ] || [ "$((10#$HOUR))" -ge 18 ]; then
            echo "outside 10:00–18:00 Europe/Bucharest; skipping"
            echo "run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "in-window; running"
          echo "run=true" >> "$GITHUB_OUTPUT"

  scrape:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run build:data

      - name: Commit data.json if changed
        id: commit
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/public/data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no data change"
            exit 0
          fi
          git add src/public/data.json
          git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          # Rebase in case Pages workflow or another scrape pushed in between.
          for i in 1 2 3; do
            if git push; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            git pull --rebase --autostash
          done
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
