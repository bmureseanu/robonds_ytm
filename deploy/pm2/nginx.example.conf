# nginx server block for the BVB PWA subdomain.
#
# Drop into /etc/nginx/sites-available/bvb.example.com (or wherever your
# host stores per-site configs), edit the placeholders, then enable with:
#   sudo ln -sf /etc/nginx/sites-available/bvb.example.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS, add a `certbot --nginx -d bvb.example.com` pass after the
# HTTP server block is live.

server {
    listen 80;
    listen [::]:80;
    server_name bvb.example.com;          # <-- replace

    # Doc root — must match BVB_WEB_ROOT in the pm2 ecosystem config.
    # The pm2 scraper writes data.json straight into this directory;
    # the static assets (index.html, sw.js, manifest.json, icon.svg)
    # are copied here once by deploy/pm2/setup.sh.
    root /var/www/bvb;                    # <-- replace
    index index.html;

    # Set the right MIME for SVG and JSON in case the OS defaults are off.
    types {
        image/svg+xml  svg svgz;
        application/json  json;
        application/manifest+json  webmanifest;
    }

    # data.json is rewritten ~every 15 min during business hours. Don't
    # cache at the proxy; the service worker handles client-side caching
    # with stale-while-revalidate, so this is just the freshness floor.
    location = /data.json {
        add_header Cache-Control "no-cache, must-revalidate" always;
        # Atomic rename in the writer guarantees readers never see a
        # half-written file even if the request lands mid-rename.
    }

    # Service worker must be served from the same scope to register;
    # don't cache it so updates roll out quickly.
    location = /sw.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Everything else: standard static. The shell rarely changes; a short
    # cache is fine. The service worker also caches it for offline launch.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=300" always;
    }

    # Don't expose dotfiles or random junk that might land in the dir.
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/bvb.access.log;
    error_log  /var/log/nginx/bvb.error.log;
}
